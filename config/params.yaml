# Particle Filter parameters
particle_filter:
  ros__parameters:
    n_particles: 2000
    sigma_dist: 0.18      # sensor model distance std [m]
    sigma_bear: 0.18      # sensor model bearing std [rad]
    alpha: 0.25, 0.15, 0.15, 0.08]   # motion noise

# Detection Simulator parameters
detection_simulator:
  ros__parameters:
    fov_half_deg: 45.0    # half-FOV [degrees]
    max_range: 3.5        # detection range [m]
    sigma_dist: 0.15      # detection distance noise [m]
    sigma_bear: 0.15      # detection bearing noise [rad]
    min_publish_gap: 0.08 # min seconds between publishes

# Tag map (world frame, z = 1.0 m)
tag_map:
  positions:
    - [-2.10, -2.46]   # tag 0 – South wall,
    - [ 0.80, -2.46]   # tag 1 – South wall,
    - [-0.70,  2.46]   # tag 2 – North wall, 
    - [ 2.30,  2.46]   # tag 3 – North wall, 
    - [-2.96, -1.80]   # tag 4 – West wall,
    - [-2.96,  1.10]   # tag 5 – West wall, 
    - [ 2.96,  0.20]   # tag 6 – East wall, 
    - [ 2.96, -0.50]   # tag 7 – East wall, 
